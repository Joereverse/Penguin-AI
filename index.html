<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguin AI — The Future of AI-Powered Crypto</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

body {
  margin: 0;
  font-family: 'Space Grotesk', sans-serif;
  background: #0b0f1a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  position: sticky;
  top: 0;
}

/* LOGO + AVATAR */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #4fd1c5;
}

.logo h1 {
  font-size: 18px;
  margin: 0;
  font-weight: 600;
}

/* NAV */
nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  opacity: 0.8;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h2 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.7;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <!-- Penguin Avatar -->
    <img src="https://i.imgur.com/8Km9tLL.png" alt="Penguin AI Avatar">
    <h1>Penguin AI</h1>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Token</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>The Future of AI-Powered Crypto</h2>
  <p>Build. Learn. Trade. With Penguin AI.</p>

  <!-- Penguin image in hero -->
  <img src="https://i.imgur.com/8Km9tLL.png" style="width:120px;margin-top:25px;">
</section>

</body>
</html>
